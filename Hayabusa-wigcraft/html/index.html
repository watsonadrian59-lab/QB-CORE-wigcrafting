<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Drip City Wig Crafting</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <canvas id="particles"></canvas>

    <div id="ui" class="hidden">
        <div class="glass-card">

            <div class="header">
                <h1>Drip City</h1>
                <p>Wig Crafting System</p>
            </div>

            <div class="grid">

                <!-- OLD: BASIC -->
                <button class="craft-card" onclick="craft('basic_wig')">
                    <div class="card-top">
                        <i class="fas fa-user"></i>
                        <div>
                            <span>Basic Wig</span>
                            <small>Starter Style</small>
                        </div>
                    </div>

                    <div class="materials">
                        <p>Requires:</p>
                        <div id="basic_wig_materials"></div>
                    </div>
                </button>

                <!-- OLD: PREMIUM -->
                <button class="craft-card premium" onclick="craft('premium_wig')">
                    <div class="card-top">
                        <i class="fas fa-crown"></i>
                        <div>
                            <span>Premium Wig</span>
                            <small>Luxury Finish</small>
                        </div>
                    </div>

                    <div class="materials">
                        <p>Requires:</p>
                        <div id="premium_wig_materials"></div>
                    </div>
                </button>

                <!-- OLD: DYED -->
                <button class="craft-card dyed" onclick="craft('dyed_wig')">
                    <div class="card-top">
                        <i class="fas fa-palette"></i>
                        <div>
                            <span>Dyed Wig</span>
                            <small>Custom Color</small>
                        </div>
                    </div>

                    <div class="materials">
                        <p>Requires:</p>
                        <div id="dyed_wig_materials"></div>
                    </div>
                </button>

                <!-- NEW: LACE WIG -->
                <button class="craft-card" onclick="craft('lace_wig')">
                    <div class="card-top">
                        <i class="fas fa-cut"></i>
                        <div>
                            <span>Lace Front Wig</span>
                            <small>Natural Finish</small>
                        </div>
                    </div>

                    <div class="materials">
                        <p>Requires:</p>
                        <div id="lace_wig_materials"></div>
                    </div>
                </button>

                <!-- NEW: FULL LACE -->
                <button class="craft-card premium" onclick="craft('full_lace_wig')">
                    <div class="card-top">
                        <i class="fas fa-crown"></i>
                        <div>
                            <span>Full Lace Wig</span>
                            <small>Premium Coverage</small>
                        </div>
                    </div>

                    <div class="materials">
                        <p>Requires:</p>
                        <div id="full_lace_wig_materials"></div>
                    </div>
                </button>

                <!-- NEW: SYNTHETIC -->
                <button class="craft-card dyed" onclick="craft('synth_wig')">
                    <div class="card-top">
                        <i class="fas fa-wind"></i>
                        <div>
                            <span>Synthetic Wig</span>
                            <small>Budget Style</small>
                        </div>
                    </div>

                    <div class="materials">
                        <p>Requires:</p>
                        <div id="synth_wig_materials"></div>
                    </div>
                </button>

            </div>

            <div class="progress-container hidden" id="progressContainer">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <button class="close-btn" onclick="closeUI()">Close</button>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
